
services:
  postgres:
    image: postgres:16
    container_name: postgres-db

    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password@123

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: nginx:latest
    container_name: sample-app

    ports:
      - "8080:80"

    depends_on:
      - postgres

volumes:
  postgres-data: